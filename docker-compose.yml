version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lowkeybd-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lowkeybd
    ports:
      - '127.0.0.1:5433:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - lowkeybd-network

  redis:
    image: redis:7-alpine
    container_name: lowkeybd-redis
    restart: always
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - redis-data:/data
    networks:
      - lowkeybd-network

  meilisearch:
    image: getmeili/meilisearch:v1.6
    container_name: lowkeybd-meilisearch
    restart: always
    environment:
      MEILI_MASTER_KEY: 'masterKey123!'
      MEILI_NO_ANALYTICS: 'true'
    ports:
      - '127.0.0.1:7700:7700'
    volumes:
      - meili-data:/meili_data
    networks:
      - lowkeybd-network

  mailpit:
    image: axllent/mailpit
    container_name: lowkeybd-mailpit
    restart: always
    ports:
      - '127.0.0.1:8025:8025'
      - '127.0.0.1:1025:1025'
    networks:
      - lowkeybd-network

  minio:
    image: minio/minio
    container_name: lowkeybd-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '127.0.0.1:9000:9000'
      - '127.0.0.1:9001:9001'
    volumes:
      - minio-data:/data
    networks:
      - lowkeybd-network

volumes:
  postgres-data:
  redis-data:
  meili-data:
  minio-data:

networks:
  lowkeybd-network:
    driver: bridge
